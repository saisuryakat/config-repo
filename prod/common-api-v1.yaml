# Prod-wide: common across all prod APIs and entities. No API names here.

spring:
  profiles:
    active: prod
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  shutdown: graceful

logging:
  level:
    root: WARN
    org.springframework.web: INFO
    org.springframework.amqp: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

messaging:
  mq:
    hostname: mq-prod.internal
    port: 5672
    channel: prod-channel
    username: ${MQ_USERNAME}
    password: ${MQ_PASSWORD}
    connection-timeout-ms: 15000
    prefetch-count: 20

kubernetes:
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "1Gi"
  replicas: 2

ecommerce:
  api:
    timeout-seconds: 20
    rate-limit-enabled: true
    circuit-breaker-enabled: true
