# customers-api for entity api-gb01 (cert). API name and API-specific config here.

spring:
  application:
    name: customers-api

logging:
  level:
    com.ecommerce.customers: DEBUG

messaging:
  mq:
    request-queue: gb01.customers.request
    response-queue: gb01.customers.response

kubernetes:
  resources:
    requests:
      cpu: "200m"
      memory: "384Mi"

ecommerce:
  customers:
    session-timeout-minutes: 45
    pii-masking-enabled: true
