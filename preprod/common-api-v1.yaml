# Preprod-wide: common across all preprod envs (cert, cert0, sct). No API names here.

spring:
  profiles:
    active: preprod
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  shutdown: graceful

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.amqp: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

messaging:
  mq:
    hostname: mq-preprod.internal
    port: 5672
    channel: preprod-channel
    username: ${MQ_USERNAME}
    password: ${MQ_PASSWORD}
    connection-timeout-ms: 30000
    prefetch-count: 10

kubernetes:
  resources:
    requests:
      cpu: "200m"
      memory: "384Mi"
    limits:
      cpu: "1000m"
      memory: "768Mi"
  replicas: 1

ecommerce:
  api:
    timeout-seconds: 30
    rate-limit-enabled: true
    circuit-breaker-enabled: true
