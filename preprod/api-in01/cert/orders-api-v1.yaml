# orders-api for entity api-in01 (cert). API name and API-specific config here.

spring:
  application:
    name: orders-api

logging:
  level:
    com.ecommerce.orders: DEBUG

messaging:
  mq:
    request-queue: in01.orders.request
    response-queue: in01.orders.response

kubernetes:
  resources:
    requests:
      cpu: "300m"
      memory: "512Mi"

ecommerce:
  orders:
    max-items-per-order: 99
    idempotency-window-minutes: 10
